version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: interviewpai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: interviewpai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - interviewpai-network

  redis:
    image: redis:7-alpine
    container_name: interviewpai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interviewpai-network

  minio:
    image: minio/minio
    container_name: interviewpai-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - interviewpai-network

  backend:
    build: ./backend
    container_name: interviewpai-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: interviewpai
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: 12345678
      JWT_SECRET: interviewpai-jwt-secret-key-2024
      DEEPSEEK_KEY: ${DEEPSEEK_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - interviewpai-network

  frontend:
    build: ./frontend
    container_name: interviewpai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - interviewpai-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  interviewpai-network:
    driver: bridge
